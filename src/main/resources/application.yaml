spring:
  application:
    name: W-judge
  threads:
    virtual:
      enabled: true

server:
  port: 9119

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: W-judge

judge:
  pool:
    max-total-per-key: 20
    max-idle-per-key: 10
    max-total: 100
    max-wait: 30s
  thread:
    thread-name-prefix: "judge-exec-"
  sandbox:
    memory-limit: 1073741824 # 1GB
    nano-cpus: 1000000000 # 1 CPU
  compiler:
    time-limit: 120000 # 120s (Go cold build needs more time)
    memory-limit: 536870912 # 512MB
  workspace:
    root: "/tmp/W-judge/workspace"
  docker:
    max-connections: 100
  concurrency:
    max-running-test-cases: 100
