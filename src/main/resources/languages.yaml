languages:
  - name: "c"
    imageName: "gcc:13.2.0"
    sourceExtension: ".c"
    srcFileName: "main.c"
    compileCmd: "gcc main.c -o main -O2 -Wall -lm -static -std=c11"
    runCmd: "./main"
    maxCpuTime: 3000
    maxMemory: 268435456 # 256MB

  - name: "cpp"
    imageName: "gcc:13.2.0"
    sourceExtension: ".cpp"
    srcFileName: "main.cpp"
    compileCmd: "g++ main.cpp -o main -O2 -Wall -lm -static -std=c++20"
    runCmd: "./main"
    maxCpuTime: 3000
    maxMemory: 268435456

  - name: "java"
    imageName: "eclipse-temurin:8-jdk-ubi10-minimal"
    sourceExtension: ".java"
    srcFileName: "Main.java"
    compileCmd: "javac Main.java"
    runCmd: "java -Xmx256m -Xss1m Main"
    maxCpuTime: 5000
    maxMemory: 536870912 # 512MB

  - name: "python"
    imageName: "python:3.12-slim"
    sourceExtension: ".py"
    srcFileName: "main.py"
    compileCmd: "python3 -B -m py_compile main.py" # Syntax check
    runCmd: "python3 -B main.py"
    maxCpuTime: 5000
    maxMemory: 268435456

  - name: "go"
    imageName: "golang:1.26.1-trixie"
    sourceExtension: ".go"
    srcFileName: "main.go"
    compileCmd: "GOCACHE=/app/.go-cache CGO_ENABLED=0 go build -o main main.go"
    runCmd: "./main"
    maxCpuTime: 3000
    maxMemory: 268435456
